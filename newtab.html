<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Euphoric</title>
    <link rel="stylesheet" href="newtab.css" />
</head>

<body>
    <!-- subtle grain + glow layers -->
    <div class="bg-layer bg-glow" aria-hidden="true"></div>
    <div class="bg-layer bg-grain" aria-hidden="true"></div>

    <header class="topbar">
        <button class="icon-btn left" aria-label="Open menu" title="Menu">
            <!-- checklist icon -->
            <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                <path d="M9 6h12" />
                <path d="M9 12h12" />
                <path d="M9 18h12" />
                <path d="M3.5 6.2l1.2 1.2 2.2-2.4" />
                <path d="M3.5 12.2l1.2 1.2 2.2-2.4" />
                <path d="M3.5 18.2l1.2 1.2 2.2-2.4" />
            </svg>
        </button>

        <div class="brand">
            <span class="brand-go">GO</span>
            <span class="brand-euphoric">Euphoric</span>
        </div>
    </header>

    <aside class="rail" aria-label="Quick actions">
        <button class="rail-btn" aria-label="Music" title="Music">
            <!-- headphones -->
            <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                <path d="M4 13a8 8 0 0 1 16 0" />
                <path d="M4 13v6a2 2 0 0 0 2 2h1v-8H6a2 2 0 0 0-2 2Z" />
                <path d="M20 13v6a2 2 0 0 1-2 2h-1v-8h1a2 2 0 0 1 2 2Z" />
            </svg>
        </button>

        <button class="rail-btn" aria-label="Timer" title="Timer">
            <!-- stopwatch -->
            <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                <path d="M10 2h4" />
                <path d="M12 14l3-3" />
                <path d="M8 4h8" />
                <path d="M19.5 10.5a8 8 0 1 1-15 0 8 8 0 0 1 15 0Z" />
            </svg>
        </button>

        <button class="rail-btn" aria-label="Notes" title="Notes">
            <!-- notes -->
            <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                <path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
                <path d="M8 8h8" />
                <path d="M8 12h8" />
                <path d="M8 16h6" />
            </svg>
        </button>

        <button class="rail-btn" aria-label="Theme" title="Theme">
            <!-- palette -->
            <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                <path
                    d="M12 3a9 9 0 1 0 0 18h2.2a2.4 2.4 0 0 0 0-4.8H13a2 2 0 0 1 0-4h3.2A3.8 3.8 0 0 0 20 8.4 9 9 0 0 0 12 3Z" />
                <path d="M7.5 10.2h0.01" />
                <path d="M9.8 7.8h0.01" />
                <path d="M14.2 7.8h0.01" />
                <path d="M16.5 10.2h0.01" />
            </svg>
        </button>
    </aside>

    <main class="center">
        <div class="clock" aria-label="Current time">
            <span id="hh" class="hh">05</span>
            <span class="colon">:</span>
            <span id="mm" class="mm">37</span>
            <span id="ampm" class="ampm">AM</span>
        </div>

        <div id="date" class="date">May 13</div>
    </main>

    <footer class="footer">
        <p id="quote" class="quote">
            Just when you think it can't get any worse, it can. And just when you think it can't get any better, it can
        </p>
<a id="photoCredit" class="credit" target="_blank" rel="noreferrer"></a>

        <div class="signature">Euphoric</div>
    </footer>

    <script src="newtab.js" defer></script>
</body>

</html>
